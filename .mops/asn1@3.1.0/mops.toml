[package]
name = "asn1"
version = "3.1.0"
description = "A Motoko implementation of ASN.1 (Abstract Syntax Notation One) encoding and decoding"
repository = "https://github.com/edjcase/motoko_asn1"
keywords = ["asn1", "der", "encode", "decode"]
license = "MIT"

[dependencies]
"xtended-numbers@2" = "2.1.0"
"core@1" = "1.0.0"
"xtended-iter@1" = "1.1.0"
"buffer@0" = "0.1.0"

[dev-dependencies]
test = "2.1.1"
