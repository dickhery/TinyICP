[package]
name = "certified-assets"
description = "A library for certifying assets served via HTTP, ensuring the security of query calls on the IC."
repository = "https://github.com/NatLabs/certified-assets"
version = "0.6.0"
license = "MIT"
keywords = [ "assets", "http", "certification" ]

[dependencies]
base = "0.15.1"
ic-certification = "1.0.0"
sha2 = "0.1.6"
http-parser = "0.4.1"
http-types = "1.0.1"
serde = "3.3.2"
map = "9.0.1"
vector = "0.4.2"
base-x-encoder = "2.0.0"
rep-indy-hash = "0.1.1"

[dev-dependencies]
test = "2.1.1"
bench = "1.0.0"
fuzz = "1.0.0"
itertools = "0.2.2"

[toolchain]
wasmtime = "24.0.0"
moc = "0.15.1"
