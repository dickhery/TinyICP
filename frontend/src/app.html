<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width" />
	<title>Liminal URL Shortener</title>
	<style>
		#redirect-loading-shell {
			display: none;
		}

		#redirect-loading-shell.active {
			display: block;
			min-height: 100vh;
			padding: 40px;
			box-sizing: border-box;
			background: #000;
			color: #00ff9c;
			font-family: "Courier New", monospace;
		}

		#redirect-loading-shell .redirect-panel {
			max-width: 640px;
			margin: 10vh auto;
			border: 1px solid #00ff9c;
			padding: 32px;
			text-align: center;
			box-shadow: 0 0 24px rgba(0, 255, 156, 0.15);
			background: rgba(0, 0, 0, 0.92);
		}

		#redirect-loading-shell .redirect-kicker {
			margin: 0 0 1rem;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			color: #8fffd2;
		}

		#redirect-loading-shell h1 {
			margin: 0 0 1rem;
			font-size: clamp(1.7rem, 4vw, 2.4rem);
		}

		#redirect-loading-shell .redirect-url {
			margin: 1.25rem 0;
			padding: 0.85rem 1rem;
			border: 1px dashed rgba(143, 255, 210, 0.45);
			background: rgba(0, 255, 156, 0.06);
			color: #d7fff0;
			overflow-wrap: anywhere;
			word-break: break-word;
		}
	</style>
	<script>
		const isShortLinkPath = window.location.pathname.startsWith("/s/");
		if (isShortLinkPath) {
			document.documentElement.classList.add("short-link-loading");
			window.addEventListener("DOMContentLoaded", () => {
				const shell = document.getElementById("redirect-loading-shell");
				const pathTarget = document.getElementById("redirect-loading-path");
				if (shell) {
					shell.classList.add("active");
				}
				if (pathTarget) {
					pathTarget.textContent = `tinyicp.com${window.location.pathname}`;
				}
			});
		}
	</script>
	<script>
		const contactWidgetSrc =
			"https://thowo-iqaaa-aaaab-ac3wa-cai.icp0.io/contact.js?id=contact-15&color=%2391ff24";
		const shouldLoadContactWidget = !window.location.pathname.startsWith("/s/");

		if (
			shouldLoadContactWidget &&
			!document.getElementById("tinyicp-contact-widget-script")
		) {
			const contactWidgetScript = document.createElement("script");
			contactWidgetScript.id = "tinyicp-contact-widget-script";
			contactWidgetScript.src = contactWidgetSrc;
			contactWidgetScript.defer = true;
			document.head.appendChild(contactWidgetScript);
		}
	</script>
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div id="redirect-loading-shell">
		<div class="redirect-panel">
			<p class="redirect-kicker">TinyICP</p>
			<h1>Redirecting you to the original URL...</h1>
			<p>Preparing the destination for this short link.</p>
			<p id="redirect-loading-path" class="redirect-url">tinyicp.com</p>
		</div>
	</div>
	<div class="browser-warning">
		⚠️ If this page appears broken, try reloading. If the problem persists, try switching browsers; Chrome or
		Firefox are recommended.
	</div>
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
