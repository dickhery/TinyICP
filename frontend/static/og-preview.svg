  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1020" cy="118" r="150" fill="#91ff24" opacity="0.08" />
  <circle cx="930" cy="560" r="180" fill="#20e39a" opacity="0.08" />
  <rect x="52" y="52" width="1096" height="526" rx="36" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.9" />
  <rect x="104" y="112" width="144" height="144" rx="34" fill="#05070c" stroke="#91ff24" stroke-width="8" />
